name: "Terraform Platform Deployment"

# Triggers only on push to main branch and workflow_dispatch.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

jobs:
  security-scan:
    name: "Security Scan & Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/platform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../

      - name: Bootstrap Terraform State
        run: bash ../../scripts/bootstrap-tfstate.sh ${{ env.TF_STATE_RESOURCE_GROUP }} ${{ env.TF_STATE_STORAGE_ACCOUNT }} ${{ env.TF_STATE_CONTAINER }} centralindia

      - name: Terraform Init
        id: init
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Checkov Static Code Analysis
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/platform
          framework: terraform
          soft_fail: false
          skip_path: terraform/environments
          skip_check: CKV_AZURE_139,CKV_AZURE_237,CKV_AZURE_166,CKV_AZURE_233,CKV_AZURE_164,CKV_AZURE_167,CKV_AZURE_163,CKV_AZURE_165,CKV_AZURE_117,CKV_AZURE_115,CKV_AZURE_227,CKV_AZURE_170,CKV_AZURE_226,CKV_AZURE_6,CKV_AZURE_33

      - name: Publish Status to Job Summary
        if: always()
        run: |
          echo "### Security Scan & Validate Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status == 'success' && '✅ Success' || '❌ Failure' }}" >> $GITHUB_STEP_SUMMARY

  terraform-plan:
    name: "Terraform Plan"
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/platform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}"

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan -no-color

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/platform/tfplan
          retention-days: 1

      - name: Publish Status to Job Summary
        if: always()
        run: |
          echo "### Terraform Plan Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status == 'success' && '✅ Success' || '❌ Failure' }}" >> $GITHUB_STEP_SUMMARY

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform/platform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/platform

      - name: Terraform Init
        id: init
        env:
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        run: terraform output

      - name: Publish Status to Job Summary
        if: always()
        run: |
          echo "### Terraform Apply Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status == 'success' && '✅ Success' || '❌ Failure' }}" >> $GITHUB_STEP_SUMMARY

  notify:
    name: "Send Email Notification"
    needs: [security-scan, terraform-plan, terraform-apply]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine Overall Status
        id: status
        run: |
          if [ "${{ needs.security-scan.result }}" == "failure" ] || [ "${{ needs.terraform-plan.result }}" == "failure" ] || [ "${{ needs.terraform-apply.result }}" == "failure" ]; then
            echo "overall=Failure" >> $GITHUB_OUTPUT
          else
            echo "overall=Success" >> $GITHUB_OUTPUT
          fi
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ResolveOps Deployment Notification - Status: ${{ steps.status.outputs.overall }}"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "ResolveOps CI/CD"
          body: |
            The ResolveOps platform deployment pipeline has completed.
            
            Overall Result: ${{ steps.status.outputs.overall }}
            
            Stage Results:
            - Security Scan & Validate: ${{ needs.security-scan.result }}
            - Terraform Plan: ${{ needs.terraform-plan.result }}
            - Terraform Apply: ${{ needs.terraform-apply.result }}
           
            Triggered by: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
