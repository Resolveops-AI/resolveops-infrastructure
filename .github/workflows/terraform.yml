name: "Terraform Platform Deployment"

# Triggers only on push to main branch and workflow_dispatch.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-platform:
    name: "Terraform Platform"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/platform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../

      - name: Bootstrap Terraform State
        run: bash ../../scripts/bootstrap-tfstate.sh Sathvik-RG stsathviktfstate tfstate westus2

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Checkov Static Code Analysis
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/platform
          framework: terraform
          soft_fail: false
          skip_path: terraform/environments
          skip_check: CKV_AZURE_139,CKV_AZURE_237,CKV_AZURE_166,CKV_AZURE_233,CKV_AZURE_164,CKV_AZURE_167,CKV_AZURE_163,CKV_AZURE_165,CKV_AZURE_117,CKV_AZURE_115,CKV_AZURE_227,CKV_AZURE_170,CKV_AZURE_226,CKV_AZURE_6,CKV_AZURE_33

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="terraform.tfvars" -no-color

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Terraform Outputs
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform output

      - name: Publish Status to Job Summary
        if: always()
        run: |
          echo "### Terraform Platform Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status == 'success' && '✅ Success' || '❌ Failure' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Link**: [Go to Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  notify:
    name: "Send Email Notification"
    needs: terraform-platform
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "ResolveOps Deployment Notification - Status: ${{ needs.terraform-platform.result }}"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "ResolveOps CI/CD"
          body: |
            The ResolveOps platform deployment pipeline has completed.
            
            Result: ${{ needs.terraform-platform.result }}
            Triggered by: ${{ github.actor }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Run details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
