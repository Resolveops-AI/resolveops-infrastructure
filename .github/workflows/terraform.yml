name: "Terraform Platform Deployment"

# Triggers on pushes/PRs that modify terraform files.
# Authentication uses branch-based OIDC — no environment gate.
#
# Azure Entra Federated Credential for this workflow must be configured as:
#   Subject: repo:Resolveops-AI/resolveops-infrastructure:ref:refs/heads/main
#
# This means the Azure App Registration (or Managed Identity) that holds
# AZURE_CLIENT_ID must have a federated credential matching the subject above.
# Do NOT use environment-scoped subjects (e.g. repo:...:environment:dev) for
# this platform workflow — branch-based OIDC is the correct approach.
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-platform:
    name: "Terraform Platform"
    runs-on: ubuntu-latest
    # No `environment:` key here — branch-based OIDC is used instead.
    # Adding environment: dev would require an environment-scoped federated
    # credential on the Azure side, which is incorrect for the platform.
    defaults:
      run:
        working-directory: terraform/platform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Checkov Static Code Analysis
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/platform
          framework: terraform
          soft_fail: false
          skip_check: CKV_AZURE_139,CKV_AZURE_237,CKV_AZURE_166,CKV_AZURE_233,CKV_AZURE_164,CKV_AZURE_167,CKV_AZURE_163,CKV_AZURE_165,CKV_AZURE_117,CKV_AZURE_115,CKV_AZURE_227,CKV_AZURE_170,CKV_AZURE_226

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-platform
          path: terraform/platform/tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Outputs
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: terraform output
